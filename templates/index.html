<!DOCTYPE html>
<html>
<head>
<title>AI Study Analyzer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Poppins;
background:linear-gradient(120deg,#6fa8ff,#7ee0c3);
padding:30px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
input{padding:10px;border-radius:10px;border:1px solid #ccc;width:100%}

button{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#5f9cff,#4fd1c5);
color:white;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:20px;
padding:18px;
background:#f4f7ff;
border-left:5px solid #5f9cff;
border-radius:12px;
}

#chat-box{
margin-top:25px;
background:#f4f7ff;
padding:15px;
border-radius:12px;
height:150px;
overflow:auto;
}
</style>
</head>

<body>

<div class="container">

<h2>AI Phân tích học tập</h2>

<form method="POST">
<div class="grid">
<div>Toán <input name="toan"></div>
<div>Ngữ văn <input name="van"></div>
<div>Tiếng Anh <input name="anh"></div>
<div>Vật lí <input name="ly"></div>
<div>Hóa học <input name="hoa"></div>
<div>Sinh học <input name="sinh"></div>
<div>Lịch sử <input name="su"></div>
<div>Địa lí <input name="dia"></div>
<div>GD KTPL <input name="gdkt"></div>
<div>Tin học <input name="tin"></div>
<div>Công nghệ <input name="congnghe"></div>
<div>Âm nhạc <input name="nhac"></div>
<div>Mĩ thuật <input name="mythuat"></div>
</div>

<button type="submit">Phân tích AI</button>
</form>

{% if result %}
<div class="result">{{result|safe}}</div>
{% endif %}

{% if scores %}
<canvas id="chart"></canvas>

<script>
new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:{{scores.keys()|list|tojson}},
datasets:[{
label:"Điểm các môn",
data:{{scores.values()|list|tojson}},
borderWidth:1
}]
},
options:{scales:{y:{beginAtZero:true,max:10}}}
})
</script>
{% endif %}

<h3>Chat AI hướng nghiệp</h3>
<div id="chat-box"></div>

<input id="chat-input" placeholder="Nhập câu hỏi">
<button onclick="sendChat()">Gửi</button>

<script>
async function sendChat(){
const input=document.getElementById("chat-input");
const msg=input.value.trim();
if(!msg) return;

const box=document.getElementById("chat-box");
box.innerHTML+=`<p><b>Bạn:</b> ${msg}</p>`;
input.value="";

try{
const res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"message="+encodeURIComponent(msg)
});
const data=await res.json();
box.innerHTML+=`<p><b>AI:</b> ${data.reply}</p>`;
}catch{
box.innerHTML+=`<p><b>AI:</b> Lỗi kết nối AI</p>`;
}
}
</script>

</div>
</body>
</html>
